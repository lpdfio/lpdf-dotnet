name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # ── Download WASI binary from core release ───────────────────────────────
      # Derives the core tag from the version in Lpdf.csproj (strip patch → .0).
      # Falls back to the latest release when the version is a placeholder (0.0.0)
      # or the derived tag does not yet exist.
      - name: Download lpdf-wasi.wasm
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p wasm
          CSPROJ_VERSION=$(grep -oP '(?<=<Version>)[^<]+' Lpdf.csproj || echo "0.0.0")
          CORE_TAG="v$(echo "$CSPROJ_VERSION" | sed 's/\.[0-9]*$/.0/')"
          echo "Resolved core tag: $CORE_TAG"
          for attempt in 1 2 3; do
            gh release download "$CORE_TAG" \
              --repo lpdfio/lpdf \
              --pattern "lpdf-wasi.wasm" \
              --dir wasm \
              --clobber && break
            echo "Attempt $attempt failed — retrying in 10s..."
            sleep 10
          done
          # Fallback to latest release when the derived tag doesn't exist yet
          if [ ! -f wasm/lpdf-wasi.wasm ]; then
            gh release download \
              --repo lpdfio/lpdf \
              --pattern "lpdf-wasi.wasm" \
              --dir wasm \
              --clobber
          fi
          mv wasm/lpdf-wasi.wasm wasm/lpdf.wasm   # csproj embeds as lpdf.wasm

      # ── Build ────────────────────────────────────────────────────────────────
      - name: Restore
        run: dotnet restore Lpdf.sln

      - name: Build
        run: dotnet build Lpdf.sln -c Release --no-restore

      # ── Fetch test fixtures and snapshots from core ──────────────────────────
      - name: Fetch test fixtures and snapshots from core
        run: |
          git clone --depth 1 --filter=blob:none --sparse \
            https://github.com/lpdfio/lpdf.git _core
          git -C _core sparse-checkout set test/fixtures test/snapshots
          mkdir -p test/fixtures test/snapshots
          cp -r _core/test/fixtures/. test/fixtures/
          cp -r _core/test/snapshots/. test/snapshots/
          rm -rf _core

      - name: Test
        run: dotnet test Lpdf.sln --no-build -c Release
